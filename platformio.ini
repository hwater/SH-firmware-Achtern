; ============================================================
;  AchternSensorik – PlatformIO Konfiguration
;  SensESP Framework (Signal K + WiFi + OTA + Web)
; ============================================================
[env:esp32dev]
platform  = espressif32 @ ^6.9.0
board     = esp32dev
framework = arduino

; Pre-build patch: inject a "Dash" navbar item into the SensESP web UI
; (see scripts/patch_sensesp_navbar.py for why this can't be done from the sketch).
extra_scripts = pre:scripts/patch_sensesp_navbar.py

monitor_speed = 115200
upload_speed  = 460800
upload_protocol = esptool
upload_port = /dev/cu.SLAB_USBtoUART
upload_flags =

; ── Partitionstabelle: 1.6 MB App + 704 KB SPIFFS (System-Settings-Persistenz) ──
board_build.partitions = partitions_achtern.csv

build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=0
  ; ESP_LOGE + ESP_LOGW sichtbar – zeigt SPIFFS-Fehler beim Speichern
  -DCORE_DEBUG_LEVEL=2
  ; SensESP Log-Level: 0=NONE 1=ERROR 2=WARN 3=INFO 4=DEBUG 5=VERBOSE
  -DSENSESP_LOG_LEVEL=3

lib_deps =
  ; ── SensESP Framework (bringt ESPAsyncWebServer, ReactESP, ArduinoJSON mit) ──
  ; Repo: https://github.com/SignalK/SensESP
  SignalK/SensESP @ >=3.2.0,<4.0.0-alpha.1

  ; ── NMEA2000 – Timo Lappalainen ──────────────────────────
  ; repo: https://github.com/ttlappalainen/NMEA2000
  ttlappalainen/NMEA2000-library
  ttlappalainen/NMEA2000_esp32 @ ^1.0.0

  ; ── Display ──────────────────────────────────────────────
  adafruit/Adafruit SSD1306 @ ^2.5.7
  adafruit/Adafruit GFX Library @ ^1.11.5

  ; ── Umgebungssensor ──────────────────────────────────────
  adafruit/Adafruit BME680 Library @ ^2.0.2
  adafruit/Adafruit BusIO @ ^1.16.1

  ; ── DS18B20 Temperatursensoren ───────────────────────────
  paulstoffregen/OneWire @ ^2.3.7
  milesburton/DallasTemperature @ ^3.11.0

; ── OTA Upload (nach erstem USB-Flash) ───────────────────────────────────
; PlatformIO espota hat einen Bug mit kurzen Timeouts → direkt aufrufen:
; python3 ~/.platformio/packages/framework-arduinoespressif32/tools/espota.py \
;   -i 192.168.11.64 -p 3232 -I <host-ip> \
;  -f .pio/build/esp32dev/firmware.bin -a REDACTED-OTA-PW
